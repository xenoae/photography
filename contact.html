<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Michael Hartley</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="mainNav">
  <a href="index.html" class="nav-logo">Michael Hartley</a>
  <ul class="nav-links">
    <li><a href="index.html">Gallery</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
  <button class="nav-hamburger" onclick="toggleMobileMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<nav class="mobile-menu" id="mobileMenu">
  <a href="index.html">Gallery</a>
  <a href="about.html">About</a>
  <a href="contact.html" class="active">Contact</a>
</nav>

<!-- Full-bleed header image -->
<div class="hero-img-placeholder">[ Add a header photo ]</div>

<div class="page-content">
  <h1 class="page-title">Contact</h1>
  <p class="page-subtitle" style="margin-bottom:36px">Have a question or just want to say hello? Send a message below.</p>

  <form class="contact-form" onsubmit="submitForm(event)">
    <!-- Name row -->
    <div style="margin-bottom:4px">
      <label class="form-label" style="font-size:0.75rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--mid);display:block;margin-bottom:8px">Name</label>
      <div class="form-name-row">
        <div class="form-group">
          <input type="text" placeholder="First name" required>
        </div>
        <div class="form-group">
          <input type="text" placeholder="Last name" required>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="your@email.com" required>
    </div>

    <div class="form-group">
      <label>Subject</label>
      <input type="text" placeholder="What's on your mind?" required>
    </div>

    <div class="form-group">
      <label>Message</label>
      <textarea placeholder="Write your message here…" required></textarea>
    </div>

    <button type="submit" class="btn-submit">Send Message</button>
    <p class="form-success" id="formSuccess">✓ Message sent — I'll get back to you soon.</p>
  </form>
</div>

<footer>
  <span class="footer-name">© 2026 Michael Hartley</span>
  <div class="footer-right">
    <button class="footer-admin" onclick="openAdminPrompt()">Admin</button>
  </div>
</footer>

<!-- Admin -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-panel">
    <div class="admin-header">
      <h2>Admin Panel</h2>
      <button class="admin-close" onclick="closeAdmin()">×</button>
    </div>
    <div class="admin-body" id="adminBody"></div>
  </div>
</div>

<script src="admin.js"></script>
<script>
  function toggleMobileMenu() {
    document.getElementById('mobileMenu')?.classList.toggle('open');
  }
  function submitForm(e) {
    e.preventDefault();
    const s = document.getElementById('formSuccess');
    s.style.display = 'block';
    e.target.reset();
    setTimeout(() => { s.style.display = 'none'; }, 6000);
  }
</script>
</body>
</html>
